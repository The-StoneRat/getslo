<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slo — slow photos, real prints, mailed to your door</title>
  <meta name="description" content="Slo is a slow-photography app. Fill a pack at your own pace and we mail you real prints.">
  <meta property="og:title" content="Slo">
  <meta property="og:description" content="Slow photos. Real prints, mailed to your door.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://getslo.cam/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,700;8..144,800&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="hero wrap">
      <h1 class="wordmark">Slo.</h1>
      <p class="tagline">Slow photos. Real prints, mailed to your door.</p>
      <a class="cta" href="https://play.google.com/store/apps/details?id=art.stonerat.slo">
        <img src="assets/google-play-badge.png" alt="Get it on Google Play">
      </a>
    </section>

    <section class="steps wrap">
      <div class="step">
        <h3><span>1.</span>Take your shots</h3>
        <p>A pack holds a handful of frames. Make each one count.</p>
      </div>
      <div class="step">
        <h3><span>2.</span>Fill the pack</h3>
        <p>Shoot across a trip, a weekend, a season. No rush.</p>
      </div>
      <div class="step">
        <h3><span>3.</span>Prints in your mailbox</h3>
        <p>When the pack is full, we mail real prints to your door.</p>
      </div>
      <img class="shot" src="assets/screenshot-placeholder.svg" alt="Slo app screenshot">
    </section>

    <footer class="wrap">
      <a href="/privacy">Privacy</a>
      <span class="sep">·</span>
      <a href="mailto:stonerat.who@gmail.com">Contact</a>
    </footer>
  </main>
</body>
</html>
